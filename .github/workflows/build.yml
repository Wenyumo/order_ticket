name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git python3 python3-dev python3-pip openjdk-11-jdk
        
    - name: Install Python dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install --upgrade Cython virtualenv
        pip3 install buildozer
        
    - name: Build APK
      run: |
        cd android
        buildozer -v android debug
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: bitbus-apk
        path: android/bin/*.apk
        retention-days: 30  # 保存30天
